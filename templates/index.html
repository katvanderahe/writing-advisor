{% extends "base.html" %}
{% block content %}
<section>
    <h2>Improve your writing</h2>
    <p>Paste a paragraph or short text. The app will analyze it and suggest improvements.</p>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <form method="post">
        <label for="text">Your text</label>
        <textarea id="text" name="text" rows="10">{{ text or "" }}</textarea>
        <button type="submit">Get advice</button>
    </form>
</section>

{% if advice %}
<section>
    <h2>Advice</h2>
    <pre>{{ advice }}</pre>
</section>
{% endif %}
{% endblock %}
